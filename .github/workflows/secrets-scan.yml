name: secrets-scan

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:
    branches:
      - master
      - main
      - develop

jobs:
  tracker-passkey-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan tracked files for tracker-passkey patterns
        run: |
          mapfile -t files < <(git ls-files)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No tracked files."
            exit 0
          fi
          python3 scripts/pre-commit/check_no_tracker_secrets.py "${files[@]}"
